general.import = ["/home/ale/.config/alacritty/themes/gruvbox_material_medium_dark.toml"]

[env]
TERM = "xterm-256color"
#__GLX_VENDOR_LIBRARY_NAME = "nvidia"
#__NV_PRIME_RENDER_OFFLOAD = "1"

[font]
size = 12.0

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "BoldItalic"

[font.italic]
family = "Hack Nerd Font"
style = "MediumItalic"

[font.normal]
family = "Hack Nerd Font"
style = "Medium"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F12"
mods = "Command"

[terminal]
shell ={ program = "/usr/bin/bash", args= ["-c", "exec bash -ic 'fish -i'"]}
#program = "/usr/bin/bash" args = ["-c", "exec bash -ic 'fish -i'"]
[window]
decorations = "none"

[window.padding]
x = 0

